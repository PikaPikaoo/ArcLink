<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Device Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f7f8fa;
            color: #1f2937;
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px 120px;
            line-height: 1.5;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border-left: 4px solid #2d6cf7;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1f2937;
            text-align: center;
        }

        .status {
            font-size: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }

        .status-search {
            background: #e6f7ff;
            color: #0958d9;
        }

        .status-success {
            background: #f0fff4;
            color: #006838;
        }

        .status-empty {
            background: #f5f5f5;
            color: #595959;
        }

        .subnet-desc {
            font-size: 14px;
            color: #595959;
            text-align: center;
            margin-bottom: 8px;
        }

        .subnet-tip {
            font-size: 12px;
            color: #8c8c8c;
            text-align: center;
            margin-bottom: 16px;
        }

        .ip-inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .ip-inputs input {
            width: 62px;
            height: 42px;
            text-align: center;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background: #fff;
        }

        .ip-inputs input::placeholder {
            color: #bfbfbf;
        }

        .ip-inputs input.invalid {
            border-color: #ff4d4f;
            background: #fff1f0;
        }

        .ip-inputs input:focus {
            border-color: #2d6cf7;
        }

        .dot {
            font-size: 16px;
            font-weight: bold;
            color: #595959;
        }

        .suffix {
            font-size: 14px;
            color: #8c8c8c;
            margin-left: 4px;
        }

        .float-btn {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 56px;
            border-radius: 28px;
            background: #2d6cf7;
            color: #fff;
            border: none;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(45, 108, 247, 0.25);
            cursor: pointer;
            outline: none;
        }

        .float-btn:active {
            background: #1b5bdd;
        }

        .device-item {
            padding: 16px;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
        }

        .device-model {
            font-size: 14px;
            color: #595959;
            margin-top: 4px;
            margin-bottom: 12px;
        }

        .device-link {
            display: inline-block;
            padding: 10px 20px;
            background: #e6f7ff;
            color: #2d6cf7;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="title" id="title_main">局域网设备搜索</div>
        <div id="status" class="status status-search">准备就绪</div>
    </div>

    <div class="card">
        <div class="title" id="title_custom">手动指定网段</div>
        <div class="subnet-desc" id="subnet_desc">输入IP前三段，自动扫描 .2 ~ .254</div>
        <div class="subnet-tip" id="subnet_tip">网段可参考路由器背面的网关地址</div>
        <div class="ip-inputs">
            <input type="number" id="o1" placeholder="192" min="0" max="255" oninput="clearError(this)">
            <span class="dot">.</span>
            <input type="number" id="o2" placeholder="168" min="0" max="255" oninput="clearError(this)">
            <span class="dot">.</span>
            <input type="number" id="o3" placeholder="31" min="0" max="255" oninput="clearError(this)">
            <span class="suffix">.xxx</span>
        </div>
    </div>

    <div id="result"></div>
    <button class="float-btn" id="searchBtn" onclick="startSearch()">搜索设备</button>

    <script>
        const PORT = 8265;
        const PATH = "/identify";
        const WEB_PORT = 8080;
        const TIMEOUT = 400;

        let isFound = false;
        let isSearching = false;
        let currentLang = 'en';

        const langMap = {
            'zh':'zh','zh-CN':'zh','zh-TW':'zh','zh-HK':'zh',
            'en':'en','en-US':'en','en-GB':'en',
            'fr':'fr','de':'de','it':'it','es':'es','pt':'pt',
            'pl':'pl','ru':'ru','tr':'tr','nl':'nl','el':'el','hu':'hu'
        };

        const texts = {
            zh: {
                title_main:"局域网设备搜索",
                title_custom:"手动指定网段",
                subnet_desc:"输入IP前三段，自动扫描 .2 ~ .254",
                subnet_tip:"网段可参考路由器背面的网关地址",
                btn:"搜索设备",
                ready:"准备就绪",
                searching:"正在搜索设备...",
                found:"已找到设备：",
                notFound:"未搜索到设备",
                invalid:"IP段输入不合法（0-255）",
                deviceFound:"设备已找到",
                enterDevice:"进入设备管理"
            },
            en: {
                title_main:"Local Device Search",
                title_custom:"Custom Subnet",
                subnet_desc:"Enter first 3 parts of IP, scan .2 ~ .254",
                subnet_tip:"Subnet can refer to gateway on router label",
                btn:"Search Devices",
                ready:"Ready",
                searching:"Searching devices...",
                found:"Device found:",
                notFound:"No device found",
                invalid:"Invalid IP segment (0-255)",
                deviceFound:"Device Found",
                enterDevice:"Go to Device"
            },
            fr: {
                title_main:"Recherche d'appareils locaux",
                title_custom:"Sous-réseau personnalisé",
                subnet_desc:"Saisissez les 3 premiers chiffres IP, scan .2 ~ .254",
                subnet_tip:"Le sous-réseau est indiqué sur l'étiquette du routeur",
                btn:"Rechercher des appareils",
                ready:"Prêt",
                searching:"Recherche en cours...",
                found:"Appareil trouvé :",
                notFound:"Aucun appareil",
                invalid:"IP invalide (0-255)",
                deviceFound:"Appareil trouvé",
                enterDevice:"Accéder à l'appareil"
            },
            de: {
                title_main:"Lokale Gerätesuche",
                title_custom:"Benutzerdefiniertes Subnetz",
                subnet_desc:"Geben Sie die ersten 3 IP-Teile ein, scan .2 ~ .254",
                subnet_tip:"Subnetz steht auf dem Router-Aufkleber",
                btn:"Geräte suchen",
                ready:"Bereit",
                searching:"Suche läuft...",
                found:"Gerät gefunden:",
                notFound:"Kein Gerät gefunden",
                invalid:"Ungültiger IP-Bereich (0-255)",
                deviceFound:"Gerät gefunden",
                enterDevice:"Gerät öffnen"
            },
            it: {
                title_main:"Ricerca Dispositivi Locali",
                title_custom:"Subnet Personalizzata",
                subnet_desc:"Inserisci le prime 3 parti IP, cerca .2 ~ .254",
                subnet_tip:"Subnet sulla etichetta del router",
                btn:"Cerca Dispositivi",
                ready:"Pronto",
                searching:"Ricerca in corso...",
                found:"Dispositivo trovato:",
                notFound:"Nessun dispositivo",
                invalid:"IP non valido (0-255)",
                deviceFound:"Dispositivo Trovato",
                enterDevice:"Apri Dispositivo"
            },
            es: {
                title_main:"Búsqueda de Dispositivos Locales",
                title_custom:"Subred Personalizada",
                subnet_desc:"Ingrese las 3 primeras partes de IP, escanea .2 ~ .254",
                subnet_tip:"Subred en la etiqueta del enrutador",
                btn:"Buscar Dispositivos",
                ready:"Listo",
                searching:"Buscando...",
                found:"Dispositivo encontrado:",
                notFound:"Ningún dispositivo",
                invalid:"IP inválido (0-255)",
                deviceFound:"Dispositivo Encontrado",
                enterDevice:"Abrir Dispositivo"
            },
            pt: {
                title_main:"Pesquisa de Dispositivos Locais",
                title_custom:"Sub-rede Personalizada",
                subnet_desc:"Insira as 3 primeiras partes do IP, varre .2 ~ .254",
                subnet_tip:"Sub-rede na etiqueta do roteador",
                btn:"Pesquisar Dispositivos",
                ready:"Pronto",
                searching:"Pesquisando...",
                found:"Dispositivo encontrado:",
                notFound:"Nenhum dispositivo",
                invalid:"IP inválido (0-255)",
                deviceFound:"Dispositivo Encontrado",
                enterDevice:"Abrir Dispositivo"
            },
            pl: {
                title_main:"Wyszukiwanie Urządzeń Lokalnych",
                title_custom:"Własna Podsieć",
                subnet_desc:"Wprowadź pierwsze 3 części IP, skan .2 ~ .254",
                subnet_tip:"Podsieć na naklejce routera",
                btn:"Szukaj Urządzeń",
                ready:"Gotowe",
                searching:"Wyszukiwanie...",
                found:"Znaleziono urządzenie:",
                notFound:"Nie znaleziono urządzeń",
                invalid:"Nieprawidłowy IP (0-255)",
                deviceFound:"Urządzenie Znalezione",
                enterDevice:"Otwórz urządzenie"
            },
            ru: {
                title_main:"Поиск локальных устройств",
                title_custom:"Пользовательская подсеть",
                subnet_desc:"Введите первые 3 части IP, скан .2 ~ .254",
                subnet_tip:"Подсеть указана на наклейке роутера",
                btn:"Найти устройства",
                ready:"Готово",
                searching:"Поиск...",
                found:"Устройство найдено:",
                notFound:"Устройства не найдены",
                invalid:"Неверный IP (0-255)",
                deviceFound:"Устройство найдено",
                enterDevice:"Открыть устройство"
            },
            tr: {
                title_main:"Yerel Cihaz Arama",
                title_custom:"Özel Ağ",
                subnet_desc:"IP'nin ilk 3 kısmını girin, .2 ~ .254 tara",
                subnet_tip:"Ağ adresi yönlendirici etiketinde",
                btn:"Cihaz Ara",
                ready:"Hazır",
                searching:"Aranıyor...",
                found:"Cihaz bulundu:",
                notFound:"Cihaz bulunamadı",
                invalid:"Geçersiz IP (0-255)",
                deviceFound:"Cihaz Bulundu",
                enterDevice:"Cihazı Aç"
            },
            nl: {
                title_main:"Lokaal Apparaat Zoeken",
                title_custom:"Aangepast Subnet",
                subnet_desc:"Voer eerste 3 IP-onderdelen in, scan .2 ~ .254",
                subnet_tip:"Subnet staat op het routerlabel",
                btn:"Apparaten Zoeken",
                ready:"Klaar",
                searching:"Zoeken...",
                found:"Apparaat gevonden:",
                notFound:"Geen apparaat gevonden",
                invalid:"Ongeldig IP (0-255)",
                deviceFound:"Apparaat Gevonden",
                enterDevice:"Apparaat openen"
            },
            el: {
                title_main:"Αναζήτηση Τοπικών Συσκευών",
                title_custom:"Προσαρμοσμένο Δίκτυο",
                subnet_desc:"Εισάγετε τα 3 πρώτα μέρη IP, σάρωση .2 ~ .254",
                subnet_tip:"Το δίκτυο είναι στην ετικέτα του router",
                btn:"Αναζήτηση Συσκευών",
                ready:"Έτοιμο",
                searching:"Αναζήτηση...",
                found:"Συσκευή βρέθηκε:",
                notFound:"Δεν βρέθηκε συσκευή",
                invalid:"Μη έγκυρο IP (0-255)",
                deviceFound:"Συσκευή Βρέθηκε",
                enterDevice:"Άνοιγμα συσκευής"
            },
            hu: {
                title_main:"Helyi Eszközkeresés",
                title_custom:"Egyéni Alhálózat",
                subnet_desc:"Adja meg az IP első 3 részét, .2 ~ .254 vizsgálat",
                subnet_tip:"Alhálózat a router matracán olvasható",
                btn:"Eszközök Keresése",
                ready:"Kész",
                searching:"Keresés...",
                found:"Eszköz megtalálva:",
                notFound:"Nem található eszköz",
                invalid:"Érvénytelen IP (0-255)",
                deviceFound:"Eszköz Találva",
                enterDevice:"Eszköz megnyitása"
            }
        };

        function detectLang() {
            const lang = navigator.language || navigator.userLanguage || 'en';
            currentLang = langMap[lang] || 'en';
        }

        function t(key) {
            return texts[currentLang][key] || texts.en[key];
        }

        function applyLang() {
            detectLang();
            document.getElementById('title_main').innerText = t('title_main');
            document.getElementById('title_custom').innerText = t('title_custom');
            document.getElementById('subnet_desc').innerText = t('subnet_desc');
            document.getElementById('subnet_tip').innerText = t('subnet_tip');
            document.getElementById('searchBtn').innerText = t('btn');
            document.getElementById('status').innerText = t('ready');
            document.title = currentLang === 'zh' ? '设备搜索' : 'Device Search';
        }

        applyLang();

        const commonSubnets = [
            "192.168.1.", "192.168.0.", "192.168.31.",
            "192.168.2.", "192.168.10.", "192.168.100.", "10.0.0."
        ];

        function clearError(el) {
            el.classList.remove("invalid");
        }

        function validateIPPart() {
            const o1 = document.getElementById("o1");
            const o2 = document.getElementById("o2");
            const o3 = document.getElementById("o3");
            let v1 = o1.value.trim(), v2 = o2.value.trim(), v3 = o3.value.trim();
            let valid = true;

            if (v1 !== "" && (Number(v1) < 0 || Number(v1) > 255)) { o1.classList.add("invalid"); valid = false; }
            if (v2 !== "" && (Number(v2) < 0 || Number(v2) > 255)) { o2.classList.add("invalid"); valid = false; }
            if (v3 !== "" && (Number(v3) < 0 || Number(v3) > 255)) { o3.classList.add("invalid"); valid = false; }

            if ((v1 || v2 || v3) && !(v1 && v2 && v3)) {
                if (!v1) o1.classList.add("invalid");
                if (!v2) o2.classList.add("invalid");
                if (!v3) o3.classList.add("invalid");
                valid = false;
            }
            return valid;
        }

        function getCustomSubnet() {
            const o1 = document.getElementById("o1").value.trim();
            const o2 = document.getElementById("o2").value.trim();
            const o3 = document.getElementById("o3").value.trim();
            return (o1 && o2 && o3) ? `${o1}.${o2}.${o3}.` : null;
        }

        async function startSearch() {
            if (isSearching) return;
            isFound = false;
            isSearching = true;
            document.getElementById("result").innerHTML = "";

            if (!validateIPPart()) {
                setStatus(t('invalid'), 'empty');
                isSearching = false;
                return;
            }

            const custom = getCustomSubnet();
            let scanList = [...new Set([...commonSubnets, custom].filter(Boolean))];
            setStatus(t('searching'), 'search');

            const promises = [];
            for (const net of scanList) {
                for (let i = 2; i < 255; i++) {
                    if (isFound) break;
                    const ip = net + i;
                    const url = `http://${ip}:${PORT}${PATH}`;
                    promises.push(
                        fetch(url, {
                            mode: "cors",
                            cache: "no-store",
                            signal: AbortSignal.timeout(TIMEOUT)
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (!isFound && data.mark === "my-device") {
                                isFound = true;
                                showDevice(ip, data.model || "Unknown");
                            }
                        })
                        .catch(() => {})
                    );
                }
            }

            await Promise.allSettled(promises);
            if (!isFound) setStatus(t('notFound'), 'empty');
            isSearching = false;
        }

        function showDevice(ip, model) {
            setStatus(`${t('found')} ${ip}`, 'success');
            document.getElementById("result").innerHTML = `
            <div class="card">
                <div class="title">${t('deviceFound')}</div>
                <div class="device-item">${ip}</div>
                <div class="device-model">${model}</div>
                <div style="text-align:center">
                    <a class="device-link" href="http://${ip}:${WEB_PORT}">${t('enterDevice')}</a>
                </div>
            </div>`;
        }

        function setStatus(text, type) {
            const el = document.getElementById("status");
            el.textContent = text;
            el.className = `status status-${type}`;
        }
    </script>
</body>
</html>
